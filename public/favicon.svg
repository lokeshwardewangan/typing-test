<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Typing Test logo">
  <defs>
    <linearGradient id="cap" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#643afb" />
      <stop offset="1" stop-color="#f42156" />
    </linearGradient>
  </defs>

  <!-- keycap -->
  <rect x="4" y="4" width="56" height="56" rx="14" fill="url(#cap)" />

  <!-- the bit of text already typed -->
  <rect x="16" y="29" width="20" height="6" rx="3" fill="#ffffff" opacity="0.9" />

  <!-- the typing caret -->
  <rect x="40" y="21" width="6" height="22" rx="3" fill="#ffd60a" />
</svg>

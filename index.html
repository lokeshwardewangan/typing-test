<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Typing Test — Check Your Typing Speed</title>
    <meta
      name="description"
      content="A simple, minimal typing speed test. Type the words before the clock runs out and see your WPM, correct letters and errors."
    />
    <meta name="theme-color" content="#060912" />

    <!-- favicon -->
    <link rel="icon" type="image/svg+xml" href="public/favicon.svg" />

    <!-- open graph (link previews) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Typing Test — Check Your Typing Speed" />
    <meta
      property="og:description"
      content="A simple, minimal typing speed test. Type the words before the clock runs out and see your WPM, correct letters and errors."
    />
    <meta property="og:image" content="public/favicon.svg" />

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <a
      class="github_link"
      href="https://github.com/lokeshwardewangan/typing-test"
      target="_blank"
      rel="noopener noreferrer"
      title="View source on GitHub"
      aria-label="View source on GitHub"
    >
      <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor" aria-hidden="true"><path d="M12 .5C5.37.5 0 5.78 0 12.29c0 5.2 3.44 9.6 8.21 11.16.6.11.82-.25.82-.56 0-.28-.01-1.02-.02-2-3.34.71-4.04-1.58-4.04-1.58-.55-1.37-1.33-1.74-1.33-1.74-1.09-.73.08-.71.08-.71 1.2.08 1.83 1.21 1.83 1.21 1.07 1.8 2.81 1.28 3.5.98.11-.76.42-1.28.76-1.57-2.67-.3-5.47-1.31-5.47-5.83 0-1.29.47-2.34 1.24-3.17-.12-.3-.54-1.52.12-3.16 0 0 1.01-.32 3.3 1.21a11.6 11.6 0 0 1 3-.4c1.02 0 2.04.14 3 .4 2.28-1.53 3.29-1.21 3.29-1.21.66 1.64.24 2.86.12 3.16.77.83 1.24 1.88 1.24 3.17 0 4.53-2.81 5.53-5.49 5.82.43.37.81 1.1.81 2.22 0 1.6-.01 2.9-.01 3.29 0 .31.21.68.83.56A12.02 12.02 0 0 0 24 12.29C24 5.78 18.63.5 12 .5z"></path></svg>
    </a>
    <div class="container">
      <header class="heading">
        <h2>How Fast Can You Type?</h2>
      </header>
      <main class="main">
        <div id="timer_wrapper">
          <div class="second"></div>
        </div>
        <div class="typing_wrapper">
          <div class="typing_text_wrapper">
            <p id="typing_text" class="typing_text">this is a simple typing test with easy words. the sun is bright and
             he sky is blue. birds fly over the trees and people walk in the
              park. a small dog runs on the grass. everyone enjoys the fresh air
              and the pleasant weather during the day.</p>
          </div>
        </div>
        <div class="result_wrapper">
          <span class="result_topline"></span>
          <h3 class="result_heading">Result</h3>
          <div class="result_cards">
            <div class="result_card card_wpm">
              <div class="wpm card_value"></div>
              <span class="card_label">wpm</span>
            </div>
            <div class="result_card stat_card">
              <div class="total_time stat_value"></div>
              <span class="stat_label">time</span>
            </div>
            <div class="result_card stat_card">
              <div class="noOfRightWord stat_value"></div>
              <span class="stat_label">correct</span>
            </div>
            <div class="result_card stat_card">
              <div class="noOfWrongWord stat_value"></div>
              <span class="stat_label">errors</span>
            </div>
          </div>
          <div class="button_wrapper_again">
            <button id="again_test_button">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path></svg>
              Try Again
            </button>
          </div>
        </div>
      </main>
    </div>
    <script src="script.js"></script>
  </body>
</html>

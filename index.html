<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Typing Test</title>
  </head>
  <body>
    <div class="container">
      <div class="heading">
        <h2>Typing Test Practice</h2>
      </div>
      <div class="typing_wrapper">
        <div class="button_wrapper">
          <button>Start Test</button>
        </div>
        <div class="typing_text_wrapper">
          <p id="typing_text" class="typing_text">
            <span class="cursor"></span>
            this is a simple typing test with easy words. the sun is bright and
            the sky is blue. birds fly over the trees and people walk in the
            park. a small dog runs on the grass. everyone enjoys the fresh air
            and the pleasant weather during the day.
          </p>
        </div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
